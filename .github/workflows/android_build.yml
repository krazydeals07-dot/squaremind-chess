name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Fix Git Safe Directory
        run: git config --global --add safe.directory "*"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Project
        run: npx vite build

      - name: Create Missing Assets Directory
        run: mkdir -p android/app/src/main/assets

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Agree to Gradle Terms
        run: |
          mkdir -p ~/.gradle
          echo "systemProp.org.gradle.internal.publish.checksums.to.gradle.enterprise=true" > ~/.gradle/gradle.properties

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace -Dorg.gradle.welcome=never -Pandroid.plugin.validation.enabled=false -Pandroid.nonTransitiveRClass=false

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk